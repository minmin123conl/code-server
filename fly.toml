# fly.toml app configuration file generated for code-server-xrv-xa on 2026-06-15T11:28:15Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'code-server-xrv-xa'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile.fly'

[env]
  PASSWORD = 'your-password-here'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
